# This workflow builds the employee_events package and runs the pytest suite
# on every push and pull request targeting the main branch.

name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd ./python-package
        python setup.py sdist
        cd ..
        pip install -r requirements.txt
    - name: Test with pytest
      run: |
        pytest
